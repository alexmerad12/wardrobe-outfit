<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Linette — Monogram</title>
  <!-- Stripped to the essentials: black tile + white Parisienne L.
       Earlier iterations (damask textile, bordered medallion,
       vignettes) felt cluttered at home-screen tile sizes. The
       monogram alone reads cleanly even at 48 dp. -->
  <rect width="400" height="400" fill="#000000" rx="88" ry="88"/>
  <!-- Parisienne L glyph (baked path from scripts/extract-l-path.mjs).
       Source path is centered around (200, 200) at fontSize 200 in a
       400x400 viewBox. Scaled 1.2x around the canvas center — the
       previous 1.45x pushed the L's curly extents (especially the
       lower-left descender) into the rx=88 rounded-corner clip
       region, so on Android home-screen launchers the corners of
       the L got cut. 1.2x clears the corner curve with breathing
       room while still filling the tile confidently. -->
