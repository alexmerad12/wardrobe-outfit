<?xml version="1.0" encoding="UTF-8"?>
<!-- V8 — Radial gradient (vermillion core, navy edges, green at bottom).
     Matches splash-concept-v3. The "C" is rendered as a vector path from
     Playfair Display (medium weight) so it doesn't depend on a font being
     installed at render time. -->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
