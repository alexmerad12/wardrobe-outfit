<?xml version="1.0" encoding="UTF-8"?>
<!-- Splash V4 — Radial gradient (vermillion core, navy edges, green below).
     "Linette" rendered via <text> with Playfair Display fallback chain. Was
     previously baked path data from scripts/glyphs-to-paths.mjs; switched to
     <text> in the Linette rebrand for simplicity. Re-bake paths later via
     `node scripts/glyphs-to-paths.mjs` if a font-independent splash is
     needed for export pipelines. -->
<svg viewBox="0 0 1170 2532" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#bf3f2f"/>
      <stop offset="40%"  stop-color="#5a1e2a"/>
      <stop offset="100%" stop-color="#0d1a2b"/>
    </radialGradient>
    <linearGradient id="greenTint" x1="0%" y1="50%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#234233" stop-opacity="0"/>
      <stop offset="100%" stop-color="#234233" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1170" height="2532" fill="url(#bg)"/>
  <rect width="1170" height="2532" fill="url(#greenTint)"/>

  <!-- Wordmark centered at (585, 1266). Same paint-order trick (stroke
       under fill) the previous baked path used for the editorial outline. -->
  <text x="585" y="1266"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Playfair Display','Bodoni Moda',Didot,'Times New Roman',Georgia,serif"
        font-weight="500"
        font-size="220"
        fill="#ffffff"
        stroke="#0d1a2b"
        stroke-width="6"
        paint-order="stroke"
        style="letter-spacing:-0.01em;">Linette</text>
</svg>
