<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Closette — Ivory Noir</title>
  <defs>
    <!-- Damask medallion shape at native scale (max radius ~24 with volutes).
         Used 3× per tile via <use>, scaled 0.5 to match patterns.tsx. -->
    <g id="damask">
      <path d="M0 -18 Q 8 -10 0 0 Q -8 -10 0 -18 Z" fill="#0a0806" opacity="0.95"/>
      <path d="M0 0 Q 8 10 0 18 Q -8 10 0 0 Z" fill="#0a0806" opacity="0.95"/>
      <path d="M-18 0 Q -10 -8 0 0 Q -10 8 -18 0 Z" fill="#0a0806" opacity="0.9"/>
      <path d="M18 0 Q 10 -8 0 0 Q 10 8 18 0 Z" fill="#0a0806" opacity="0.9"/>
      <path d="M0 -17 Q 13 -23 16 -12 Q 14 -6 7 -8" fill="none" stroke="#0a0806" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
      <path d="M0 -17 Q -13 -23 -16 -12 Q -14 -6 -7 -8" fill="none" stroke="#0a0806" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
      <path d="M0 17 Q 13 23 16 12 Q 14 6 7 8" fill="none" stroke="#0a0806" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
      <path d="M0 17 Q -13 23 -16 12 Q -14 6 -7 8" fill="none" stroke="#0a0806" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
      <circle cx="0" cy="-24" r="1.2" fill="#0a0806" opacity="0.75"/>
      <circle cx="0" cy="24" r="1.2" fill="#0a0806" opacity="0.75"/>
      <circle cx="-24" cy="0" r="1" fill="#0a0806" opacity="0.65"/>
      <circle cx="24" cy="0" r="1" fill="#0a0806" opacity="0.65"/>
      <circle cx="0" cy="0" r="1.8" fill="#f8efd6" opacity="0.55"/>
    </g>
    <!-- Rose & Damask tile — same 90×156 hex lattice as patterns.tsx, with
         3 medallions per tile + diamond hairline connectors. patternTransform
         offsets the tile so a medallion lands at viewport center (200,200),
         exactly like centerX=45/centerY=39 in PatternSurface. -->
    <pattern id="rd-tile" x="0" y="0" width="90" height="156"
             patternUnits="userSpaceOnUse" patternTransform="translate(155 161)">
      <rect width="90" height="156" fill="#ebe0c8"/>
      <g stroke="#3a2a1e" stroke-width="0.7" fill="none" opacity="0.55" stroke-linecap="round">
        <line x1="45" y1="39" x2="0" y2="117"/>
        <line x1="45" y1="39" x2="90" y2="117"/>
        <line x1="45" y1="39" x2="0" y2="-39"/>
        <line x1="45" y1="39" x2="90" y2="-39"/>
        <line x1="0" y1="117" x2="45" y2="195"/>
        <line x1="90" y1="117" x2="45" y2="195"/>
      </g>
      <g transform="translate(45 39) scale(0.5)"><use href="#damask"/></g>
      <g transform="translate(0 117) scale(0.5)"><use href="#damask"/></g>
      <g transform="translate(90 117) scale(0.5)"><use href="#damask"/></g>
    </pattern>
  </defs>

  <!-- Rounded ivory ground (rx 22% matches .icon-tile's border-radius) -->
  <rect width="400" height="400" fill="#ebe0c8" rx="88" ry="88"/>
  <!-- Damask pattern fill, clipped to the same rounded shape -->
  <rect width="400" height="400" fill="url(#rd-tile)" rx="88" ry="88"/>

  <!-- Solid ivory disc covering the centre. Disc r=130 (65% of icon width)
       matches the bordered-solid Monogram's disc as it appears in TileIcon
       (Monogram size = 0.74 × tile, disc = 88% of Monogram → 65% of tile). -->
  <circle cx="200" cy="200" r="130" fill="#ebe0c8"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#0a0806" stroke-width="2" opacity="0.92"/>
  <circle cx="200" cy="200" r="118" fill="none" stroke="#0a0806" stroke-width="0.8" opacity="0.55"/>

  <!-- 4 cardinal dots inside the disc edge (84/88 ratio, matches Monogram) -->
  <circle cx="200" cy="76"  r="2.1" fill="#0a0806" opacity="0.85"/>
  <circle cx="200" cy="324" r="2.1" fill="#0a0806" opacity="0.85"/>
  <circle cx="76"  cy="200" r="2.1" fill="#0a0806" opacity="0.85"/>
  <circle cx="324" cy="200" r="2.1" fill="#0a0806" opacity="0.85"/>

  <!-- The C — Bodoni Moda, geometrically centered. font-size 200 ≈ 70% of
       disc diameter, the same proportion BodoniC uses in Monogram (size=140
       in viewBox 200, disc r=88 → C/disc = 79.5%). -->
  <text x="200" y="200"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Bodoni Moda','Bodoni 72',Didot,'Times New Roman',Georgia,serif"
        font-weight="400"
        font-size="200"
        fill="#0a0806"
        style="letter-spacing:-0.03em;font-style:normal;">C</text>
</svg>
